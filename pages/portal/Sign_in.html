<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href=../../css/style.css" type="text/css" media="all" />
</head>
  <title>Sign up</title>
<body>
<div class="container">
        <h1>KLD-Hub</h1>
        <p>Creating an account</p>

        <form action="Homepage.html" target="_blank">
            <div class="input-group">
                <label for="new_email">Create Email</label>
                <input type="email" id="new_email" name="new_email" placeholder="Create your Email" required>
            </div>

            <div class="input-group">
                <label for="new_password">Create Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Create your Password" required>
            </div>
          
            <div class="input-group">
                <label for="confirm_password">Re-Enter Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-Enter your Password" required>
            </div>
            
            <div class="input-group">
                <label for="existing_email">Email</label>
                <input type="email" id="existing_email" name="existing_email" placeholder="Email" required>
            </div>
          
            <div class="input-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" placeholder="Mobile Number" pattern="[0-9]{10,15}" required>
            </div>
          
          
            <button type="submit">Create account</button>
        </form>
    </div>
</body>
</html>
